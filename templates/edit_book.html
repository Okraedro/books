{% extends "base.html" %}

{% block content %}
<h2>Редактировать книгу: {{ book.title }}</h2>

<form method="POST">
  <!-- Поля аналогичны форме добавления, но с заполненными значениями -->
  <div class="form-row">
    <div class="form-group col-md-8">
      <label for="title">Название книги:</label>
      <input type="text" class="form-control" id="title" name="title" value="{{ book.title }}" required>
    </div>
    <div class="form-group col-md-4">
      <label for="author">Автор:</label>
      <input type="text" class="form-control" id="author" name="author" value="{{ book.author }}" required>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group col-md-4">
      <label for="genre">Жанр:</label>
      <input type="text" class="form-control" id="genre" name="genre" value="{{ book.genre }}">
    </div>
    <div class="form-group col-md-4">
      <label for="year_published">Год издания:</label>
      <input type="number" class="form-control" id="year_published" name="year_published" value="{{ book.year_published }}">
    </div>
    <div class="form-group col-md-4">
      <label for="pages">Количество страниц:</label>
      <input type="number" class="form-control" id="pages" name="pages" value="{{ book.pages }}">
    </div>
  </div>

  <div class="form-row">
    <div class="form-group col-md-4">
      <label for="rating">Рейтинг (1–5):</label>
      <select class="form-control" id="rating" name="rating">
        <option value="0" {% if book.rating == 0 %}selected{% endif %}>Не оценивать</option>
        <option value="1.0" {% if book.rating == 1.0 %}selected{% endif %}>1 - Плохо</option>
        <option value="2.0" {% if book.rating == 2.0 %}selected{% endif %}>2 - Ниже среднего</option>
        <option value="3.0" {% if book.rating == 3.0 %}selected{% endif %}>3 - Средне</option>
        <option value="4.0" {% if book.rating == 4.0 %}selected{% endif %}>4 - Хорошо</option>
        <option value="5.0" {% if book.rating == 5.0 %}selected{% endif %}>5 - Отлично</option>
      </select>
    </div>
    <div class="form-group col-md-4">
      <label for="status">Статус чтения:</label>
      <select class="form-control" id="status" name="status">
        <option value="not_started" {% if book.status == 'not_started' %}selected{% endif %}>Не начата</option>
        <option value="reading" {% if book.status == 'reading' %}selected{% endif %}>Читаю сейчас</option>
        <option value="finished" {% if book.status == 'finished' %}selected{% endif %}>Прочитана</option>
        <option value="abandoned" {% if book.status == 'abandoned' %}selected{% endif %}>Заброшена</option>
      </select>
    </div>
    <div class="form-group col-md-4">
      <div class="form-check mt-4">
        <input type="checkbox" class="form-check-input" id="is_favorite" name="is_favorite" {% if book.is_favorite %}checked{% endif %}>
        <label class="form-check-label" for="is_favorite">Любимая книга</label>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label for="cover_url">Ссылка на обложку:</label>
    <input type="url" class="form-control" id="cover_url" name="cover_url" value="{{ book.cover_url }}" placeholder="https://...">
  </div>

  <div class="form-group">
    <label for="notes">Личные заметки:</label>
    <textarea class="form-control" id="notes" name="notes" rows="3">{{ book.notes }}</textarea>
  </div>

  <button type="submit" class="btn btn-primary">Сохранить изменения</button>
  <a href="{{ url_for('my_books') }}" class="btn btn-secondary">Отмена</a>
  <a href="{{ url_for('delete_book', book_id=book.id) }}"
     class="btn btn-danger float-right"
     onclick="return confirm('Вы уверены, что хотите удалить эту книгу?')">
    Удалить книгу
  </a>
</form>
{% endblock %}
