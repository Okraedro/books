{% extends "base.html" %}

{% block content %}
<div class="container">
  <h2>Панель администратора</h2>
  <div class="row">
    <div class="col-md-3 mb-3">
      <div class="card text-white bg-primary">
        <div class="card-body">
          <h5>Всего книг</h5>
          <h3>{{ total_books }}</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3 mb-3">
      <div class="card text-white bg-success">
        <div class="card-body">
          <h5>Активных аренд</h5>
          <h3>{{ active_orders }}</h3>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6">
      <a href="{{ url_for('admin_books') }}" class="btn btn-lg btn-outline-primary">Управление книгами</a>
    </div>
  </div>
</div>
{% endblock %}
