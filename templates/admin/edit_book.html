{% extends "base.html" %}

{% block content %}
<h2>Редактирование книги (админ)</h2>

<form method="POST">
  <div class="form-row">
    <div class="form-group col-md-8">
      <label for="title">Название книги:</label>
      <input type="text" class="form-control" id="title" name="title" value="{{ book.title }}" required>
    </div>
    <div class="form-group col-md-4">
      <label for="author">Автор:</label>
      <input type="text" class="form-control" id="author" name="author" value="{{ book.author }}" required>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group col-md-4">
      <label for="genre">Жанр:</label>
      <input type="text" class="form-control" id="genre" name="genre" value="{{ book.genre }}">
    </div>
    <div class="form-group col-md-4">
      <label for="year_published">Год издания:</label>
      <input type="number" class="form-control" id="year_published" name="year_published" value="{{ book.year_published }}">
    </div>
    <div class="form-group col-md-4">
      <label for="price">Цена:</label>
      <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ book.price }}" required>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group col-md-6">
      <div class="form-check">
        <input type="checkbox" class="form-check-input" id="is_available" name="is_available"
               {% if book.is_available %}checked{% endif %}>
        <label class="form-check-label" for="is_available">Доступна для аренды/покупки</label>
      </div>
    </div>
    <div class="form-group col-md-6">
      <label for="status">Статус книги:</label>
      <select class="form-control" id="status" name="status">
        <option value="active" {% if book.status == 'active' %}selected{% endif %}>Активна</option>
        <option value="archived" {% if book.status == 'archived' %}selected{% endif %}>Архивирована</option>
        <option value="out_of_stock" {% if book.status == 'out_of_stock' %}selected{% endif %}>Нет в наличии</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="cover_url">Ссылка на обложку:</label>
    <input type="url" class="form-control" id="cover_url" name="cover_url" value="{{ book.cover_url }}">
  </div>

  <div class="form-group">
    <label for="description">Описание книги:</label>
    <textarea class="form-control" id="description" name="description" rows="3">{{ book.description }}</textarea>
  </div>

  <div class="mt-3">
    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
    <a href="{{ url_for('admin_books') }}" class="btn btn-secondary">Отмена</a>
  </div>
</form>
{% endblock %}
